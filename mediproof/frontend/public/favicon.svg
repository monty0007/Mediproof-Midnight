<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <rect width="32" height="32" rx="8" fill="url(#glow)"/>
  <!-- Medication / cross pill icon (Material Symbols "medication" outline) -->
  <!-- Pill body rotated 45deg centred at 16,16 -->
  <g transform="translate(16,16) rotate(45) translate(-16,-16)">
    <rect x="10" y="7" width="12" height="18" rx="6" fill="white" opacity="0.95"/>
    <!-- Dividing line in the middle of the pill -->
    <line x1="10" y1="16" x2="22" y2="16" stroke="#0891b2" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
